<body class="selection:bg-cyan-500/30 overflow-x-hidden antialiased">

    <!-- 容灾错误边界 -->
    <div id="error-boundary"
        class="fixed inset-0 bg-[#020617] z-[999999] flex-col items-center justify-center text-center p-6">
        <div class="w-20 h-20 bg-red-900/30 text-red-500 rounded-3xl flex items-center justify-center text-4xl mb-6 border border-red-500/30">⚠️</div>
        <h1 class="text-3xl font-black text-white mb-4">系统配置解析异常</h1>
        <p class="text-slate-400 mb-8 max-w-md">后台数据加载失败，系统已触发安全降级保护。请检查配置字典的语法完整性。</p>
        <button type="button" onclick="window.location.reload()"
            class="px-8 py-3 bg-slate-800 text-white rounded-xl font-bold hover:bg-slate-700 transition-colors">尝试重新加载</button>
    </div>

    <!-- 全局安全防盗水印层 -->
    <div id="security-watermark"></div>

    <!-- Tailwind CDN 动态注入安全白名单 -->
    <div class="hidden md:grid-cols-5 md:col-span-2 md:col-span-3 sm:w-[600px] md:w-[800px] lg:w-[1000px] xl:w-[1200px] sm:h-[95vh] z-[99999] z-[150] z-[9990] opacity-100 opacity-0 translate-x-0 translate-x-full translate-y-10 items-end sm:items-center justify-end p-0 sm:p-4 rounded-t-[2rem] sm:rounded-[2rem]"></div>

    <script>
        window.addEventListener('error', function(e) {
            if (e.message && e.message.includes('ResizeObserver')) return;
            alert("JS Error: " + e.message + " at " + e.filename + ":" + e.lineno);
        });
        window.addEventListener('unhandledrejection', function(e) {
            alert("Promise Error: " + (e.reason ? e.reason.message || e.reason : 'Unknown'));
        });
    </script>

    <!-- 导航栏 -->
